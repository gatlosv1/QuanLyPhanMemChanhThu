services:
  - type: web
    name: quanlyphanmemchanhthu-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: CORS_ORIGINS
        value: https://gatlosv1.github.io
      - key: DB_SERVER
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: API_TOKEN
        sync: false
      - key: API_ROLE
        value: admin
      - key: RESET_PASSWORD
        sync: false
      - key: HISTORY_PASSWORD
        sync: false
      - key: DELETE_PASSWORD
        sync: false
      - key: AUTH_ACCOUNTS_JSON
        sync: false
