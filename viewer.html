<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Xem Thông Tin Lô Hàng - Quản Lý Trái Cây</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-viewer">
  <script src="auth.js"></script>
  <script>
    if (!requirePageAccess('viewer.html')) {
      document.write('');
    }
  </script>

  <div class="container">
    <header>
      <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <button type="button" onclick="goToManagementPage()" style="text-decoration:none; display:inline-block; padding:8px 12px; border-radius:8px; background:#4b5563; color:white; font-weight:600; border:none; cursor:pointer;">← Trở về quản lý</button>
        <h1>📋 Thông Tin Lô Hàng</h1>
      </div>
      <div>
        <button class="scan-btn" onclick="startScanOnViewer()">📷 Quét QR</button>
        <button class="logout-btn" onclick="logoutUser()">Đăng xuất</button>
      </div>
    </header>

    <div class="content">
      <div id="loading" class="viewer-loading">Đang tải thông tin...</div>

      <div id="result" class="viewer-result-hidden">
        <div class="ma-lo" id="maLoDisplay"></div>
        <div class="info-grid">
          <div class="info-item"><div class="label">Ngày Nhập</div><div class="value" id="ngayDisplay"></div></div>
          <div class="info-item"><div class="label">Biển Số Xe</div><div class="value" id="biensoDisplay"></div></div>
          <div class="info-item"><div class="label">Kho</div><div class="value" id="khoDisplay"></div></div>
          <div class="info-item"><div class="label">TT Xe</div><div class="value" id="ttxeDisplay"></div></div>
          <div class="info-item"><div class="label">Tổng Khối Lượng</div><div class="value" id="tongklDisplay"></div></div>
          <div class="info-item"><div class="label">Nhà Cung Cấp</div><div class="value" id="nccDisplay"></div></div>
          <div class="info-item"><div class="label">Nơi Xuất Sản</div><div class="value" id="noiDisplay"></div></div>
          <div class="info-item"><div class="label">Hàng</div><div class="value" id="hangDisplay"></div></div>
          <div class="info-item"><div class="label">Múi</div><div class="value" id="muiDisplay"></div></div>
          <div class="info-item"><div class="label">Vị Trí</div><div class="value" id="vitriDisplay"></div></div>
        </div>

        <div class="viewer-actions">
          <button class="scan-btn" onclick="startScanOnViewer()">📷 Quét QR Mới</button>
        </div>
      </div>

      <div id="error" class="viewer-error-hidden">
        Không tìm thấy thông tin cho mã QR này.
      </div>
    </div>
  </div>

  <div id="scanModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📷 Quét Mã QR Code</h3>
        <button id="closeScanIcon" type="button" class="close-btn" aria-label="Đóng modal">&times;</button>
      </div>
      <div id="reader"></div>
      <div style="text-align:center; padding:12px 15px; color:#666; font-size:14px;">
        Nếu camera không mở được, bạn có thể chọn ảnh QR từ máy.
      </div>
      <div style="display:flex; justify-content:center; gap:10px; padding:0 15px 15px;">
        <label style="display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:8px; background:#0d6efd; color:white; cursor:pointer; font-weight:600;">
          📁 Chọn ảnh QR
          <input id="qrImageInput" type="file" accept="image/*" style="display:none;">
        </label>
        <button id="closeScanButton" type="button" style="padding:10px 14px; border:none; border-radius:8px; background:#6c757d; color:white; cursor:pointer; font-weight:600;">Đóng</button>
      </div>
      <div id="scanResult" style="text-align:center; padding:15px; min-height:50px;"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <script>
    const FALLBACK_FIREBASE_CONFIG = {
      apiKey: 'AIzaSyCtmyLlGJuCn35kYR6819XbaP6665KKgd8',
      authDomain: 'quanlysaurieng.firebaseapp.com',
      databaseURL: 'https://quanlysaurieng-default-rtdb.asia-southeast1.firebasedatabase.app',
      projectId: 'quanlysaurieng'
    };

    (async () => {
      let html5QrCode = null;

      window.startScanOnViewer = startScanOnViewer;
      window.closeScanModal = closeScanModal;

      const qrImageInput = document.getElementById('qrImageInput');
      if (qrImageInput) {
        qrImageInput.addEventListener('change', event => {
          const file = event.target.files && event.target.files[0];
          if (file) {
            handleImageScan(file);
          }
        });
      }

      let firebaseConfig = FALLBACK_FIREBASE_CONFIG;
      try {
        const runtimeConfig = await window.getRuntimeConfig?.() || {};
        if (runtimeConfig && Object.keys(runtimeConfig).length) {
          firebaseConfig = runtimeConfig;
        }
      } catch (error) {
        console.warn('Không lấy được runtime config, dùng cấu hình dự phòng.', error);
      }

      if (!firebase.apps.some(app => app.name === '[DEFAULT]')) {
        firebase.initializeApp(firebaseConfig);
      }

      const db = firebase.database();
      const historyRef = db.ref('qrHistory');

      async function loadQRInfo(maLo) {
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const error = document.getElementById('error');

        loading.style.display = 'block';
        result.style.display = 'none';
        error.style.display = 'none';

        try {
          const snapshot = await historyRef.once('value');
          const data = snapshot.val();
          const item = data ? Object.values(data).find(h => h.ma_lo === maLo) : null;

          if (item) {
            document.getElementById('maLoDisplay').textContent = item.ma_lo || maLo;
            document.getElementById('ngayDisplay').textContent = item.ngay_display || 'Không có';
            document.getElementById('biensoDisplay').textContent = item.bienso && item.bienso.trim() !== '' ? item.bienso : 'Không có';

            const khoList = [];
            if (item.kho1 && item.kho1.trim() !== '') khoList.push(item.kho1);
            if (item.kho2 && item.kho2.trim() !== '') khoList.push(item.kho2);
            if (item.kho3 && item.kho3.trim() !== '') khoList.push(item.kho3);
            if (item.kho4 && item.kho4.trim() !== '') khoList.push(item.kho4);

            document.getElementById('khoDisplay').textContent = khoList.length ? khoList.join(' - ') : 'Không có';
            document.getElementById('tongklDisplay').textContent = item.tongkl ? `${item.tongkl} kg` : 'Không có';
            document.getElementById('ttxeDisplay').textContent = item.ttxe || '—';
            document.getElementById('nccDisplay').textContent = item.ncc || '—';
            document.getElementById('noiDisplay').textContent = item.noi || '—';
            document.getElementById('hangDisplay').textContent = item.hang || '—';
            document.getElementById('muiDisplay').textContent = item.mui || '—';
            document.getElementById('vitriDisplay').textContent = (item.vitri1 && item.vitri2) ? `${item.vitri1}/${item.vitri2}` : (item.vitri1 || '—');
            result.style.display = 'block';
          } else {
            document.getElementById('maLoDisplay').textContent = maLo;
            document.getElementById('ngayDisplay').textContent = 'Không tìm thấy chi tiết';
            document.getElementById('biensoDisplay').textContent = '—';
            document.getElementById('khoDisplay').textContent = '—';
            result.style.display = 'block';
          }
        } catch (error) {
          console.error(error);
          error.style.display = 'block';
        } finally {
          loading.style.display = 'none';
        }
      }

      function startScanOnViewer() {
        const modal = document.getElementById('scanModal');
        const resultEl = document.getElementById('scanResult');
        modal.style.display = 'flex';
        resultEl.innerHTML = '';
        document.getElementById('qrImageInput').value = '';
        startScanner();
      }

      function closeScanModal() {
        const modal = document.getElementById('scanModal');
        modal.style.display = 'none';
        stopScanner();
      }

      function handleScanResult(decodedText) {
        stopScanner();
        closeScanModal();
        if (decodedText.includes('viewer.html')) {
          window.location.href = decodedText;
        } else {
          window.location.href = `viewer.html?q=${encodeURIComponent(decodedText)}`;
        }
      }

      async function startScanner() {
        const resultEl = document.getElementById('scanResult');
        if (html5QrCode) {
          stopScanner();
        }
        if (!window.Html5Qrcode) {
          resultEl.innerHTML = '<div style="color:#d9534f;">Thư viện quét QR chưa sẵn sàng. Vui lòng tải lại trang.</div>';
          return;
        }

        html5QrCode = new Html5Qrcode('reader');
        resultEl.innerHTML = '<div style="color:#0d6efd;">Đang mở camera...</div>';

        try {
          const cameras = await Html5Qrcode.getCameras();
          if (!cameras || cameras.length === 0) {
            resultEl.innerHTML = '<div style="color:#d9534f;">Không tìm thấy camera nào trên thiết bị này.</div>';
            return;
          }

          const preferredCamera = cameras.find(camera => /back|rear|environment/i.test(camera.label)) || cameras[0];
          await html5QrCode.start(
            { deviceId: { exact: preferredCamera.id } },
            { fps: 10, qrbox: { width: 280, height: 280 } },
            (decodedText) => handleScanResult(decodedText),
            () => {}
          );
        } catch (err) {
          console.error('Lỗi mở camera QR:', err);
          resultEl.innerHTML = '<div style="color:#d9534f;">Không thể mở camera. Bạn có thể chọn ảnh QR từ máy.</div>';
        }
      }

      function handleImageScan(file) {
        if (!file) return;
        if (!window.Html5Qrcode) {
          document.getElementById('scanResult').innerHTML = '<div style="color:#d9534f;">Thư viện quét QR chưa sẵn sàng.</div>';
          return;
        }

        const resultEl = document.getElementById('scanResult');
        resultEl.innerHTML = '<div style="color:#0d6efd;">Đang đọc mã QR từ ảnh...</div>';
        if (html5QrCode) {
          stopScanner();
        }
        html5QrCode = new Html5Qrcode('reader');
        html5QrCode.scanFile(file, true)
          .then(decodedText => handleScanResult(decodedText))
          .catch(() => {
            resultEl.innerHTML = '<div style="color:#d9534f;">Không đọc được mã QR từ ảnh. Vui lòng thử ảnh khác.</div>';
          });
      }

      function stopScanner() {
        if (html5QrCode) {
          html5QrCode.stop().catch(() => {});
          html5QrCode = null;
        }
      }

      document.getElementById('closeScanIcon').addEventListener('click', closeScanModal);
      document.getElementById('closeScanButton').addEventListener('click', closeScanModal);

      document.getElementById('scanModal').addEventListener('click', (event) => {
        if (event.target === document.getElementById('scanModal')) {
          closeScanModal();
        }
      });

      const urlParams = new URLSearchParams(window.location.search);
      const maLo = urlParams.get('q');

      if (maLo) {
        loadQRInfo(maLo);
      } else {
        document.getElementById('loading').innerHTML = '<p style="color:red;">Không có mã QR.<br>Vui lòng truy cập: <strong>viewer.html?q=MÃ_LÔ</strong></p>';
      }
    })();
  </script>
</body>
</html>
