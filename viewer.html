<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Viewer - Quản Lý Kho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#fff7ed",
              100: "#ffedd5",
              500: "#f97316",
              600: "#ea580c",
            },
          },
          boxShadow: {
            soft: "0 10px 30px rgba(2, 6, 23, 0.06)",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    if (!requirePageAccess('viewer.html')) {
      document.write('');
    }
  </script>

  <!-- Header -->
  <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/90 backdrop-blur">
    <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-3">
        <div class="grid h-11 w-11 place-items-center rounded-2xl bg-brand-500 text-white shadow-soft">
          <i data-lucide="eye" class="h-5 w-5"></i>
        </div>
        <div>
          <p class="text-xs font-medium uppercase tracking-[0.18em] text-slate-500">Hệ Thống</p>
          <h1 class="text-lg font-semibold sm:text-xl">Xem QR</h1>
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-3">
        <button onclick="goToManagementPage()" class="rounded-xl border border-slate-200 bg-white p-2.5 text-slate-500 transition hover:border-brand-500/40 hover:text-brand-500" title="Trở về">
          <i data-lucide="arrow-left" class="h-5 w-5"></i>
        </button>
        <button class="rounded-xl border border-slate-200 bg-white p-2.5 text-slate-500 transition hover:border-brand-500/40 hover:text-brand-500">
          <i data-lucide="bell" class="h-5 w-5"></i>
        </button>
        <button onclick="logoutUser()" class="rounded-xl border border-slate-200 bg-white p-2.5 text-slate-500 transition hover:border-brand-500/40 hover:text-brand-500" title="Đăng xuất">
          <i data-lucide="log-out" class="h-5 w-5"></i>
        </button>
        <div class="h-10 w-10 rounded-2xl bg-gradient-to-br from-brand-500 to-orange-400 shadow-soft"></div>
      </div>
    </div>
  </header>
  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <!-- QR Scanner -->
    <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft sm:p-6 mb-6">
      <h2 class="text-xl font-semibold mb-4">Quét Mã QR</h2>
      <div id="reader" class="mx-auto w-full sm:w-96 bg-slate-100 rounded-2xl overflow-hidden"></div>
      <p id="scannerStatus" class="mt-3 text-sm text-slate-500"></p>
      <button id="retryScannerBtn" onclick="retryScanner()" class="mt-3 hidden rounded-xl bg-brand-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-600">
        Thử lại camera
      </button>
    </div>

    <!-- Thông Tin Lô -->
    <div id="infoBox" class="hidden">
      <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft sm:p-6">
        <header class="border-b border-slate-100 pb-4 mb-6">
          <h3 class="text-xl font-semibold flex items-center gap-2">
            <i data-lucide="check-circle" class="h-6 w-6 text-emerald-500"></i>
            Thông Tin Lô Hàng
          </h3>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">TTxe</p>
            <p id="ttxeDisplay" class="text-lg font-semibold">--</p>
          </div>
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">Biển Số</p>
            <p id="biensoDisplay" class="text-lg font-semibold text-brand-600">--</p>
          </div>
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">Nơi XS</p>
            <p id="noiDisplay" class="text-lg font-semibold">--</p>
          </div>
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">NCC</p>
            <p id="nccDisplay" class="text-lg font-semibold">--</p>
          </div>
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">Kho 1</p>
            <p id="kho1Display" class="text-lg font-semibold">--</p>
          </div>
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">Kho 2</p>
            <p id="kho2Display" class="text-lg font-semibold">--</p>
          </div>
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">Kho 3</p>
            <p id="kho3Display" class="text-lg font-semibold">--</p>
          </div>
          <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
            <p class="text-xs font-medium uppercase text-slate-500 mb-1">Kho 4</p>
            <p id="kho4Display" class="text-lg font-semibold">--</p>
          </div>
        </div>

        <div class="mt-6 flex gap-3 flex-wrap">
          <button onclick="resetScanner()" class="flex-1 min-w-40 py-3 bg-slate-600 hover:bg-slate-700 text-white font-semibold rounded-2xl transition">
            <i class="fas fa-redo mr-2"></i>Quét Tiếp
          </button>
          <button onclick="printQRInfo()" class="flex-1 min-w-40 py-3 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-2xl transition">
            <i class="fas fa-print mr-2"></i>In Thông Tin
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    let scanner = null;
    let scannerRunning = false;
    let lastScannedData = null;

    function setScannerStatus(message, isError = false, showRetry = false) {
      const statusEl = document.getElementById('scannerStatus');
      const retryBtn = document.getElementById('retryScannerBtn');

      statusEl.textContent = message || '';
      statusEl.className = 'mt-3 text-sm ' + (isError ? 'text-red-600' : 'text-slate-500');
      retryBtn.classList.toggle('hidden', !showRetry);
    }

    async function initScanner() {
      if (scannerRunning) return;

      if (!window.isSecureContext) {
        setScannerStatus('Trình duyệt đang chặn camera vì trang chưa ở HTTPS/localhost. Hãy mở qua localhost hoặc HTTPS.', true, false);
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setScannerStatus('Trình duyệt không hỗ trợ truy cập camera.', true, false);
        return;
      }

      setScannerStatus('Đang khởi tạo camera...');

      try {
        if (!scanner) {
          scanner = new Html5Qrcode('reader');
        }

        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          setScannerStatus('Không tìm thấy camera trên thiết bị này.', true, true);
          return;
        }

        const rearCamera = cameras.find((camera) => /back|rear|environment/gi.test(camera.label));
        const selectedCamera = rearCamera || cameras[0];

        await scanner.start(
          { deviceId: { exact: selectedCamera.id } },
          {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            formatsToSupport: [
              Html5QrcodeSupportedFormats.QR_CODE,
              Html5QrcodeSupportedFormats.CODE_128,
            ],
          },
          onScanSuccess,
          onScanError,
        );

        scannerRunning = true;
        setScannerStatus('Camera đã sẵn sàng. Đưa mã QR vào giữa khung quét.');
      } catch (err) {
        console.error('Scanner init error:', err);
        const detail = err && err.message ? err.message : 'Không rõ nguyên nhân';
        setScannerStatus('Không thể mở camera: ' + detail + '. Hãy kiểm tra quyền camera trong trình duyệt.', true, true);
      }
    }

    async function retryScanner() {
      try {
        if (scanner && scannerRunning) {
          await scanner.stop();
        }
      } catch (err) {
        console.warn('Stop scanner before retry failed:', err);
      } finally {
        scannerRunning = false;
        scanner = null;
        document.getElementById('reader').innerHTML = '';
        initScanner();
      }
    }

    function safeScannerPause() {
      if (!scanner || !scannerRunning) return;
      try {
        scanner.pause(true);
      } catch (err) {
        console.warn('Scanner pause error:', err);
      }
    }

    function safeScannerResume() {
      if (!scanner || !scannerRunning) return;
      try {
        scanner.resume();
      } catch (err) {
        console.warn('Scanner resume error:', err);
      }
    }

    async function stopScannerOnExit() {
      if (!scanner || !scannerRunning) return;
      try {
        await scanner.stop();
      } catch (err) {
        console.warn('Scanner stop error:', err);
      } finally {
        scannerRunning = false;
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      try {
        const data = JSON.parse(decodedText);
        lastScannedData = data;

        document.getElementById('ttxeDisplay').textContent = data.ttxe || '--';
        document.getElementById('biensoDisplay').textContent = data.bienso || '--';
        document.getElementById('noiDisplay').textContent = data.noi || '--';
        document.getElementById('nccDisplay').textContent = data.ncc || '--';
        document.getElementById('kho1Display').textContent = data.kho1 || '--';
        document.getElementById('kho2Display').textContent = data.kho2 || '--';
        document.getElementById('kho3Display').textContent = data.kho3 || '--';
        document.getElementById('kho4Display').textContent = data.kho4 || '--';

        document.getElementById('infoBox').classList.remove('hidden');
        safeScannerPause();
      } catch (e) {
        console.warn('QR data is not JSON, displaying raw:', decodedText);
        lastScannedData = { rawData: decodedText };
        document.getElementById('ttxeDisplay').textContent = decodedText.substring(0, 20);
        document.getElementById('biensoDisplay').textContent = decodedText;
        document.getElementById('noiDisplay').textContent = '--';
        document.getElementById('nccDisplay').textContent = '--';
        document.getElementById('kho1Display').textContent = '--';
        document.getElementById('kho2Display').textContent = '--';
        document.getElementById('kho3Display').textContent = '--';
        document.getElementById('kho4Display').textContent = '--';
        document.getElementById('infoBox').classList.remove('hidden');
        safeScannerPause();
      }
    }

    function onScanError(error) {
      if (error && error.includes && !error.includes('NotFoundException')) {
        console.warn('QR Scan error:', error);
      }
    }

    function resetScanner() {
      document.getElementById('infoBox').classList.add('hidden');
      safeScannerResume();
      lastScannedData = null;
    }

    function printQRInfo() {
      if (!lastScannedData) return;

      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html>
        <head>
          <title>Thông Tin Lô Hàng</title>
          <style>
            body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
            .info-box { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
            .info-row { display: flex; margin: 10px 0; }
            .label { font-weight: bold; width: 150px; }
            .value { flex: 1; }
            h2 { color: #333; border-bottom: 2px solid #f97316; padding-bottom: 10px; }
          </style>
        </head>
        <body>
          <h2>Thông Tin Lô Hàng</h2>
          <div class="info-box">
            <div class="info-row">
              <span class="label">TTxe:</span>
              <span class="value">${lastScannedData.ttxe || lastScannedData.rawData || '--'}</span>
            </div>
            <div class="info-row">
              <span class="label">Biển Số Xe:</span>
              <span class="value">${lastScannedData.bienso || '--'}</span>
            </div>
            <div class="info-row">
              <span class="label">Nơi Xuất Phát:</span>
              <span class="value">${lastScannedData.noi || '--'}</span>
            </div>
            <div class="info-row">
              <span class="label">NCC:</span>
              <span class="value">${lastScannedData.ncc || '--'}</span>
            </div>
            <div class="info-row">
              <span class="label">Kho 1:</span>
              <span class="value">${lastScannedData.kho1 || '--'}</span>
            </div>
            <div class="info-row">
              <span class="label">Kho 2:</span>
              <span class="value">${lastScannedData.kho2 || '--'}</span>
            </div>
            <div class="info-row">
              <span class="label">Kho 3:</span>
              <span class="value">${lastScannedData.kho3 || '--'}</span>
            </div>
            <div class="info-row">
              <span class="label">Kho 4:</span>
              <span class="value">${lastScannedData.kho4 || '--'}</span>
            </div>
          </div>
          <script>window.print();<\/script>
        </body>
        </html>
      `);
      printWindow.document.close();
    }

    function goToManagementPage() {
      window.location.href = 'quan-ly.html';
    }

    window.addEventListener('load', () => {
      initScanner();
    });

    window.addEventListener('beforeunload', () => {
      stopScannerOnExit();
    });
  </script>
</body>
</html>
