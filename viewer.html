<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Xem Thông Tin Lô Hàng - Quản Lý Trái Cây</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-viewer">
  <div class="container">
    <header><h1>Thong Tin Lo Hang</h1></header>

    <div class="content">
      <div id="loading" style="text-align:center; padding:40px;">Dang tai thong tin...</div>

      <div id="result" style="display:none;">
        <div class="ma-lo" id="maLoDisplay"></div>
        <div class="info-grid">
          <div class="info-item"><div class="label">Ngay Nhap</div><div class="value" id="ngayDisplay"></div></div>
          <div class="info-item"><div class="label">Bien So Xe</div><div class="value" id="biensoDisplay"></div></div>
          <div class="info-item"><div class="label">Kho</div><div class="value" id="khoDisplay"></div></div>
          <div class="info-item"><div class="label">TT Xe</div><div class="value" id="ttxeDisplay"></div></div>
          <div class="info-item"><div class="label">Tong Khoi Luong</div><div class="value" id="tongklDisplay"></div></div>
          <div class="info-item"><div class="label">Nha Cung Cap</div><div class="value" id="nccDisplay"></div></div>
          <div class="info-item"><div class="label">Noi Xuat San</div><div class="value" id="noiDisplay"></div></div>
          <div class="info-item"><div class="label">Hang</div><div class="value" id="hangDisplay"></div></div>
          <div class="info-item"><div class="label">Mui</div><div class="value" id="muiDisplay"></div></div>
          <div class="info-item"><div class="label">Vi Tri</div><div class="value" id="vitriDisplay"></div></div>
        </div>

        <div style="text-align:center; margin-top:30px;">
          <button class="scan-btn" onclick="startScanOnViewer()">Quet QR Moi</button>
        </div>
      </div>

      <div id="error" style="display:none; color:red; text-align:center; padding:40px;">
        Khong tim thay thong tin cho ma QR nay.
      </div>
    </div>
  </div>

  <!-- Modal Quet QR -->
  <div id="scanModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Quet Ma QR Code</h3>
        <span onclick="closeScanModal()" class="close-btn">&times;</span>
      </div>
      <div id="reader"></div>
      <div id="scanResult" style="text-align:center; padding:15px; min-height:50px;"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtmyLlGJuCn35kYR6819XbaP6665KKgd8",
      authDomain: "quanlysaurieng.firebaseapp.com",
      databaseURL: "https://quanlysaurieng-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "quanlysaurieng",
      storageBucket: "quanlysaurieng.firebasestorage.app",
      messagingSenderId: "5286982913",
      appId: "1:5286982913:web:0dc61051f41fab874cd700"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const historyRef = db.ref('qrHistory');

    let html5QrCode = null;

    async function loadQRInfo(maLo) {
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const error = document.getElementById('error');

      loading.style.display = 'block';
      result.style.display = 'none';
      error.style.display = 'none';

      try {
        const snapshot = await historyRef.once('value');
        const data = snapshot.val();
        let item = data ? Object.values(data).find(function(h) { return h.ma_lo === maLo; }) : null;

        if (item) {
          document.getElementById('maLoDisplay').textContent = item.ma_lo || maLo;
          document.getElementById('ngayDisplay').textContent = item.ngay_display || 'Khong co';
          document.getElementById('biensoDisplay').textContent = item.bienso && item.bienso.trim() !== '' ? item.bienso : 'Khong co';

          let khoList = [];
          if (item.kho1 && item.kho1.trim() !== '') khoList.push(item.kho1);
          if (item.kho2 && item.kho2.trim() !== '') khoList.push(item.kho2);
          if (item.kho3 && item.kho3.trim() !== '') khoList.push(item.kho3);
          if (item.kho4 && item.kho4.trim() !== '') khoList.push(item.kho4);

          document.getElementById('khoDisplay').textContent = khoList.length ? khoList.join(' - ') : 'Khong co';

          document.getElementById('tongklDisplay').textContent = item.tongkl ? item.tongkl + ' kg' : 'Khong co';
          document.getElementById('ttxeDisplay').textContent = item.ttxe || '-';
          document.getElementById('nccDisplay').textContent = item.ncc || '-';
          document.getElementById('noiDisplay').textContent = item.noi || '-';
          document.getElementById('hangDisplay').textContent = item.hang || '-';
          document.getElementById('muiDisplay').textContent = item.mui || '-';
          document.getElementById('vitriDisplay').textContent =
            (item.vitri1 && item.vitri2) ? item.vitri1 + '/' + item.vitri2 : (item.vitri1 || '-');

          result.style.display = 'block';
        } else {
          document.getElementById('maLoDisplay').textContent = maLo;
          document.getElementById('ngayDisplay').textContent = 'Khong tim thay chi tiet';
          document.getElementById('biensoDisplay').textContent = '-';
          document.getElementById('khoDisplay').textContent = '-';
          result.style.display = 'block';
        }
      } catch (err) {
        error.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    function startScanOnViewer() {
      document.getElementById('scanModal').style.display = 'flex';
      document.getElementById('scanResult').innerHTML = '';
      startScanner();
    }

    function closeScanModal() {
      stopScanner();
      document.getElementById('scanModal').style.display = 'none';
    }

    function startScanner() {
      if (html5QrCode) stopScanner();
      html5QrCode = new Html5Qrcode('reader');

      html5QrCode.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 280, height: 280 } },
        function(decodedText) {
          stopScanner();
          closeScanModal();
          if (decodedText.includes('viewer.html')) {
            window.location.href = decodedText;
          } else {
            window.location.href = 'viewer.html?q=' + encodeURIComponent(decodedText);
          }
        },
        function() {}
      ).catch(function() {
        alert('Khong the mo camera.\nVui long cho phep quyen Camera trong trinh duyet.');
        closeScanModal();
      });
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().catch(function() {});
        html5QrCode = null;
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const maLo = urlParams.get('q');

    if (maLo) loadQRInfo(maLo);
    else document.getElementById('loading').innerHTML = '<p style="color:red;">Khong co ma QR.<br>Vui long truy cap: <strong>viewer.html?q=MA_LO</strong></p>';
  </script>
</body>
</html>
