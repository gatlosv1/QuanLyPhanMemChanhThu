<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="page-login">
    <div class="login-card">
      <h1>Đăng nhập</h1>
      <form id="loginForm">
        <label for="username">Tên đăng nhập</label>
        <input id="username" name="username" type="text" placeholder="Nhập tên đăng nhập" required>
        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" required>
        <button type="submit">Đăng nhập</button>
      </form>
      <p id="message" class="login-message"></p>
    </div>
    <script src="auth.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || '';

      document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const message = document.getElementById('message');

        if (!username || !password) {
          message.textContent = 'Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.';
          message.style.display = 'block';
          return;
        }

        const result = await loginUser(username, password);
        if (!result.ok) {
          message.textContent = result.message;
          message.style.display = 'block';
          return;
        }

        const targetPage = redirect || result.account.page;
        window.location.href = targetPage;
      });
    </script>
  </body>
</html>
