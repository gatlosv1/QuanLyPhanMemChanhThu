<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản Lý Kho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#fff7ed",
                100: "#ffedd5",
                500: "#f97316",
                600: "#ea580c",
              },
            },
            boxShadow: {
              soft: "0 10px 30px rgba(2, 6, 23, 0.06)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    
    <div class="flex items-center justify-center min-h-screen px-4">
      <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center h-16 w-16 rounded-3xl bg-brand-500 text-white shadow-soft mb-4 mx-auto">
            <i data-lucide="lock" class="h-8 w-8"></i>
          </div>
          <h1 class="text-3xl font-bold text-slate-900 mb-2">Đăng Nhập</h1>
          <p class="text-slate-600">Truy cập hệ thống quản lý kho hàng</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="bg-white rounded-3xl border border-slate-200 p-8 shadow-soft">
          <div class="mb-6">
            <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Tên đăng nhập</label>
            <input 
              id="username" 
              name="username" 
              type="text" 
              placeholder="Nhập tên đăng nhập" 
              required
              class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-100"
            >
          </div>

          <div class="mb-6">
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Mật khẩu</label>
            <input 
              id="password" 
              name="password" 
              type="password" 
              placeholder="Nhập mật khẩu" 
              required
              class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-100"
            >
          </div>

          <button 
            type="submit"
            class="w-full py-3 px-4 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-2xl shadow-soft transition mb-4 flex items-center justify-center gap-2"
          >
            <i data-lucide="log-in" class="h-5 w-5"></i>
            Đăng Nhập
          </button>

          <div id="message" class="hidden p-4 rounded-2xl bg-red-50 border border-red-200 text-red-700 text-sm font-medium"></div>
        </form>

        <!-- Footer -->
        <p class="text-center text-sm text-slate-600 mt-6">
          © 2026 Quản Lý Kho. All rights reserved.
        </p>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || '';

      document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const message = document.getElementById('message');

        if (!username || !password) {
          message.textContent = 'Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.';
          message.classList.remove('hidden');
          return;
        }

        const result = await loginUser(username, password);
        if (!result.ok) {
          message.textContent = result.message;
          message.classList.remove('hidden');
          return;
        }

        const targetPage = window.resolvePostLoginPage
          ? window.resolvePostLoginPage(redirect, result.account.page)
          : (result.account.page || 'dang-nhap.html');
        window.location.href = targetPage;
      });

      lucide.createIcons();
    </script>
  </body>
</html>
