<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tạo QR - Quản Lý Kho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#fff7ed",
              100: "#ffedd5",
              500: "#f97316",
              600: "#ea580c",
            },
          },
          boxShadow: {
            soft: "0 10px 30px rgba(2, 6, 23, 0.06)",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    if (!requirePageAccess('TaoQR.html')) {
      document.write('');
    }
  </script>

  <!-- Header -->
  <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/90 backdrop-blur">
    <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-3">
        <div class="grid h-11 w-11 place-items-center rounded-2xl bg-brand-500 text-white shadow-soft">
          <i data-lucide="qr-code" class="h-5 w-5"></i>
        </div>
        <div>
          <p class="text-xs font-medium uppercase tracking-[0.18em] text-slate-500">Hệ Thống</p>
          <h1 class="text-lg font-semibold sm:text-xl">Tạo QR</h1>
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-3">
        <button onclick="goToManagementPage()" class="rounded-xl border border-slate-200 bg-white p-2.5 text-slate-500 transition hover:border-brand-500/40 hover:text-brand-500" title="Trở về">
          <i data-lucide="arrow-left" class="h-5 w-5"></i>
        </button>
        <button class="rounded-xl border border-slate-200 bg-white p-2.5 text-slate-500 transition hover:border-brand-500/40 hover:text-brand-500">
          <i data-lucide="bell" class="h-5 w-5"></i>
        </button>
        <button onclick="logoutUser()" class="rounded-xl border border-slate-200 bg-white p-2.5 text-slate-500 transition hover:border-brand-500/40 hover:text-brand-500" title="Đăng xuất">
          <i data-lucide="log-out" class="h-5 w-5"></i>
        </button>
        <div class="h-10 w-10 rounded-2xl bg-gradient-to-br from-brand-500 to-orange-400 shadow-soft"></div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft sm:p-6">
      <header class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 pb-5 mb-6">
        <div>
          <h2 class="text-xl font-semibold sm:text-2xl">Tạo QR Mã</h2>
          <p class="mt-1 text-sm text-slate-500">Quản lý và tạo mã QR cho các lô hàng</p>
        </div>
        <div id="realtimeClock" class="text-sm font-semibold text-brand-600"></div>
      </header>

      <!-- Tabs -->
      <div class="flex gap-2 mb-6 border-b border-slate-200">
        <button onclick="switchQRTab(0)" id="qrtab0" class="px-4 py-3 font-semibold text-brand-600 border-b-2 border-brand-600">
          <i class="fas fa-plus-circle mr-2"></i>Tạo QR Mới
        </button>
        <button onclick="switchQRTab(1)" id="qrtab1" class="px-4 py-3 font-semibold text-slate-600 border-b-2 border-transparent hover:text-slate-900">
          <i class="fas fa-history mr-2"></i>Lịch Sử
        </button>
      </div>

      <!-- Tab: Tạo QR Mới -->
      <div id="qrcontent0" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">TTxe</label>
            <select id="ttxe" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500">
              <option value="">-- Chọn --</option>
              <option value="01">01</option><option value="02">02</option><option value="03">03</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Biển Số Xe</label>
            <input id="bienso" type="text" placeholder="51H-123.45" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500">
          </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1">Kho 1</label>
            <input id="kho1" type="text" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1">Kho 2</label>
            <input id="kho2" type="text" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1">Kho 3</label>
            <input id="kho3" type="text" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1">Kho 4</label>
            <input id="kho4" type="text" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">NCC</label>
            <select id="ncc" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500">
              <option value="009">009 - CTBT</option>
              <option value="010">010 - Nhà cung cấp B</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Nơi XS</label>
            <select id="noi" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500">
              <option value="MT">MT - Miền Tây</option>
              <option value="BP">BP - Bình Phước</option>
              <option value="DN">DN - Đồng Nai</option>
            </select>
          </div>
        </div>

        <button onclick="createQRCode()" class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-2xl transition">
          <i class="fas fa-qrcode mr-2"></i>Tạo QR Mã
        </button>
      </div>

      <!-- Tab: Lịch Sử -->
      <div id="qrcontent1" class="hidden">
        <div class="rounded-2xl border border-slate-200 overflow-auto">
          <table id="qrHistoryTable" class="w-full text-sm">
            <thead class="bg-slate-50 sticky top-0">
              <tr class="border-b">
                <th class="px-4 py-2 text-left">Thời Gian</th>
                <th class="px-4 py-2 text-left">TTxe</th>
                <th class="px-4 py-2 text-left">Biển Số</th>
                <th class="px-4 py-2 text-left">Nơi XS</th>
              </tr>
            </thead>
            <tbody id="qrHistoryBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    let qrdata = [];

    function switchQRTab(index) {
      document.getElementById('qrcontent0').classList.toggle('hidden', index !== 0);
      document.getElementById('qrcontent1').classList.toggle('hidden', index !== 1);
      document.getElementById('qrtab0').classList.toggle('text-brand-600', index === 0);
      document.getElementById('qrtab0').classList.toggle('border-brand-600', index === 0);
      document.getElementById('qrtab1').classList.toggle('text-brand-600', index === 1);
      document.getElementById('qrtab1').classList.toggle('border-brand-600', index === 1);
    }

    function createQRCode() {
      const data = {
        ttxe: document.getElementById('ttxe').value,
        bienso: document.getElementById('bienso').value,
        kho1: document.getElementById('kho1').value,
        kho2: document.getElementById('kho2').value,
        kho3: document.getElementById('kho3').value,
        kho4: document.getElementById('kho4').value,
        ncc: document.getElementById('ncc').value,
        noi: document.getElementById('noi').value,
        timestamp: new Date().toLocaleString('vi-VN')
      };
      
      if (!data.ttxe || !data.bienso) {
        alert('Vui lòng nhập TTxe và Biển số xe!');
        return;
      }

      // Generate QR data as JSON
      const qrJsonData = JSON.stringify(data);
      
      // Generate QR code (simple implementation - store in local array)
      qrdata.push({...data, qrData: qrJsonData, id: Date.now()});
      renderQRHistory();
      alert('✅ Tạo QR mã thành công!');
      
      // Reset form
      document.getElementById('ttxe').value = '';
      document.getElementById('bienso').value = '';
      document.getElementById('kho1').value = '';
      document.getElementById('kho2').value = '';
      document.getElementById('kho3').value = '';
      document.getElementById('kho4').value = '';
    }

    function renderQRHistory() {
      const tbody = document.getElementById('qrHistoryBody');
      tbody.innerHTML = qrdata.map((item, i) => `
        <tr class="border-b hover:bg-slate-50">
          <td class="px-4 py-2 text-xs">${item.timestamp}</td>
          <td class="px-4 py-2 font-semibold">${item.ttxe}</td>
          <td class="px-4 py-2 font-mono text-sm">${item.bienso}</td>
          <td class="px-4 py-2">${item.noi}</td>
        </tr>
      `).join('');
    }

    function goToManagementPage() {
      window.location.href = 'quan-ly.html';
    }

    // Hiển thị đồng hồ thực tế
    setInterval(() => {
      const now = new Date().toLocaleTimeString('vi-VN');
      const el = document.getElementById('realtimeClock');
      if (el) el.textContent = now;
    }, 1000);

    // Initialize on page load
    window.addEventListener('load', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
