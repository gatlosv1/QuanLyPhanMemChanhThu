<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tao QR - QuanLyTraiCay</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="page-qr">
  <header>
    <strong>Nhap Tao QRcode</strong>
    <div id="realtimeClock" class="clock"></div>
  </header>

  <div class="wrapper">
    <div class="left">
      <div class="tabs">
        <div class="tab active" id="tab-create">Tao QR</div>
        <div class="tab" id="tab-history">Lich su</div>
      </div>

      <div id="create-tab">
        <h3>Tao QR Moi</h3>

        <div class="form-row">
          <label for="ttxe">TTxe</label>
          <select id="ttxe">
            <option value="">-- Chon --</option>
            <option value="01">01</option><option value="02">02</option><option value="03">03</option>
            <option value="04">04</option><option value="05">05</option><option value="06">06</option>
            <option value="07">07</option><option value="08">08</option><option value="09">09</option>
            <option value="10">10</option><option value="11">11</option><option value="12">12</option>
            <option value="13">13</option><option value="14">14</option><option value="15">15</option>
            <option value="16">16</option><option value="17">17</option><option value="18">18</option>
            <option value="19">19</option><option value="20">20</option>
          </select>
        </div>

        <div class="form-row">
          <label for="bienso">Bien so xe</label>
          <input id="bienso" type="text" placeholder="Vi du: 51H-123.45" style="flex:1">
        </div>

        <div class="form-row">
          <label for="kho1">Kho 1</label>
          <input id="kho1" type="text" placeholder="Kho 1" style="flex:1">
          <label for="kho2" style="width:70px; text-align:right;">Kho 2</label>
          <input id="kho2" type="text" placeholder="Kho 2" style="flex:1">
        </div>
        <div class="form-row">
          <label for="kho3">Kho 3</label>
          <input id="kho3" type="text" placeholder="Kho 3" style="flex:1">
          <label for="kho4" style="width:70px; text-align:right;">Kho 4</label>
          <input id="kho4" type="text" placeholder="Kho 4" style="flex:1">
        </div>

        <div class="form-row">
          <label for="ncc">NCC</label>
          <select id="ncc">
            <option value="009">009 - CTBT</option>
            <option value="010">010 - Nha cung cap B</option>
          </select>
          <label for="vitri1" style="width:90px;">Vi Tri U 1</label>
          <input id="vitri1" type="text" placeholder="Vi tri U1" style="width:140px">
        </div>

        <div class="form-row">
          <label for="noi">Noi XS</label>
          <select id="noi">
            <option value="MT">MT - Mien Tay</option>
            <option value="BP">BP - Binh Phuoc</option>
            <option value="DN">DN - Dong Nai</option>
            <option value="DL">DL - Dak Lak</option>
            <option value="KH">KH - Khanh Hoa</option>
          </select>
          <label for="vitri2" style="width:90px;">Vi Tri U 2</label>
          <input id="vitri2" type="text" placeholder="Vi tri U2" style="width:140px">
        </div>

        <div class="form-row">
          <label for="hang">Hang</label>
          <select id="hang">
            <option value="D">D</option>
            <option value="R">R</option>
          </select>
          <label for="mui" style="width:90px;">Mui</label>
          <select id="mui" style="width:140px">
            <option value="0K">0K</option>
            <option value="0M">0M</option>
            <option value="TA">TA</option>
            <option value="TB">TB</option>
          </select>
        </div>

        <div class="form-row">
          <label for="ngay">Ngay Nhap</label>
          <input id="ngay" type="date" disabled>
        </div>

        <div class="form-row">
          <label for="tongkl">Tong KL</label>
          <input id="tongkl" type="text" placeholder="Nhap tong khoi luong (kg)">
        </div>

        <div class="buttons">
          <button id="clearBtn">Xoa</button>
          <button id="scanBtn" class="scan-btn">Quet QR</button>
          <button id="genBtn" class="primary">Tao QR</button>
          <button id="printBtn">In</button>
        </div>
      </div>

      <div id="history-tab" style="display:none;">
        <h3>Lich su QR Code <span id="syncStatus" style="font-size:13px;"></span></h3>

        <div class="history-actions">
          <button id="exportBtn" class="export-btn" style="display:none;">Tai lich su ve (ZIP)</button>
          <button id="importBtn" class="import-btn" style="display:none;">Nhap lich su tu file</button>
          <button id="deleteAllBtn" class="delete-all-btn" style="display:none;">Xoa toan bo lich su</button>
        </div>

        <input type="text" id="searchHistory" placeholder="Tim theo ma QR..." style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="historyList" class="history-list"></div>
      </div>
    </div>

    <div class="right">
      <div id="print-area">
        <div id="qrcode">cho tao QR</div>
        <div id="qtext" class="note"></div>
      </div>
    </div>
  </div>

  <!-- Modal Quet QR -->
  <div id="scanModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Quet Ma QR Code</h3>
        <span id="closeModal" class="close-btn">&times;</span>
      </div>
      <div id="reader" style="width:100%; max-width:400px; margin:20px auto;"></div>
      <div id="scanResult" style="text-align:center; padding:15px; min-height:50px;"></div>
    </div>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none;">

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtmyLlGJuCn35kYR6819XbaP6665KKgd8",
      authDomain: "quanlysaurieng.firebaseapp.com",
      databaseURL: "https://quanlysaurieng-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "quanlysaurieng",
      storageBucket: "quanlysaurieng.firebasestorage.app",
      messagingSenderId: "5286982913",
      appId: "1:5286982913:web:0dc61051f41fab874cd700"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const historyRef = db.ref('qrHistory');

    let history = [];
    let html5QrCode = null;
    let currentPermission = 0; // 0: none, 1: view only, 2: full

    function pad(n){ return n < 10 ? '0' + n : n; }

    const clockEl = document.getElementById('realtimeClock');
    function updateClock() {
      const d = new Date();
      clockEl.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
    function setCurrentDate() {
      document.getElementById('ngay').value = new Date().toISOString().split('T')[0];
    }
    updateClock(); setCurrentDate(); setInterval(updateClock, 1000);

    // Tab Lich su
    document.getElementById('tab-history').onclick = function() {
      document.getElementById('create-tab').style.display = 'none';
      document.getElementById('history-tab').style.display = 'block';
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.getElementById('tab-history').classList.add('active');

      if (currentPermission === 0) {
        const pass = prompt('Nhap mat khau de truy cap Lich su:\n(mat khau la nv)', '');
        if (pass === '20695') {
          currentPermission = 2;
          alert('Toan quyen truy cap da duoc kich hoat.');
        } else if (pass === 'nv' || pass === 'NV') {
          currentPermission = 1;
          alert('Che do chi xem & in da duoc kich hoat.');
        } else {
          alert('Mat khau sai!');
          document.getElementById('tab-create').click();
          return;
        }
      }
      loadHistoryFromFirebase();
      updateUIByPermission();
    };

    function updateUIByPermission() {
      const isFull = currentPermission === 2;
      document.getElementById('exportBtn').style.display = isFull ? 'inline-block' : 'none';
      document.getElementById('importBtn').style.display = isFull ? 'inline-block' : 'none';
      document.getElementById('deleteAllBtn').style.display = isFull ? 'inline-block' : 'none';
    }

    function loadHistoryFromFirebase() {
      const status = document.getElementById('syncStatus');
      status.textContent = 'Dang dong bo...';
      status.style.color = '#ffc107';

      historyRef.once('value', function(snapshot) {
        const data = snapshot.val();
        history = data ? Object.values(data) : [];
        history.sort(function(a,b) { return (b.id || 0) - (a.id || 0); });
        renderHistory();
        status.textContent = 'Da dong bo';
        status.style.color = '#28a745';
        setTimeout(function() { status.textContent = ''; }, 2000);
      });
    }

    function saveToHistory(data) {
      const newEntry = Object.assign({}, data, { timestamp: new Date().toLocaleString('vi-VN'), id: Date.now() });
      historyRef.push(newEntry).then(function() { loadHistoryFromFirebase(); });
    }

    function renderHistory(filtered) {
      const list = document.getElementById('historyList');
      const records = filtered || history;
      if (records.length === 0) {
        list.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">Chua co du lieu lich su</p>';
        return;
      }
      list.innerHTML = records.map(function(item) {
        return '\n        <div class="history-item">\n          <div onclick="loadQRFromHistory(' + JSON.stringify(item).replace(/"/g,'&quot;') + ')" style="flex:1; cursor:pointer;">\n            <strong>' + item.ma_lo + '</strong><br>\n            <small>' + (item.timestamp || '') + ' ' + (item.bienso ? '| ' + item.bienso : '') + '</small>\n          </div>\n          <div style="display:flex; gap:6px;">\n            <button class="print-btn" onclick="event.stopImmediatePropagation(); printFromHistory(\'' + item.ma_lo + '\')">In</button>\n            ' + (currentPermission === 2 ? '<button class="delete-btn" onclick="event.stopImmediatePropagation(); deleteSingleHistory(\'' + item.ma_lo + '\')">Xoa</button>' : '') + '\n          </div>\n        </div>\n      ';
      }).join('');
    }

    window.loadQRFromHistory = function(item) {
      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), {text: item.ma_lo, width: 250, height: 250});
      document.getElementById('qtext').innerHTML = '\n        <div>' + item.ma_lo + '</div>\n        <div>Ngay: ' + item.ngay_display + '</div>\n        ' + (item.tongkl ? '<div>Tong KL: ' + item.tongkl + ' kg</div>' : '') + '\n        ' + (item.bienso ? '<div>Bien so: ' + item.bienso + '</div>' : '') + '\n      ';
    };

    window.printFromHistory = function(ma_lo) {
      const item = history.find(function(h) { return h.ma_lo === ma_lo; });
      if (item) loadQRFromHistory(item);
      setTimeout(function() { window.print(); }, 300);
    };

    window.deleteSingleHistory = function(ma_lo) {
      if (currentPermission !== 2) return;
      if (!confirm('Xoa ma lo: ' + ma_lo + '?')) return;
      historyRef.orderByChild('ma_lo').equalTo(ma_lo).once('value', function(snapshot) {
        snapshot.forEach(function(child) { child.ref.remove(); });
        loadHistoryFromFirebase();
      });
    };

    // Tab Tao QR
    document.getElementById('tab-create').onclick = function() {
      document.getElementById('create-tab').style.display = 'block';
      document.getElementById('history-tab').style.display = 'none';
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.getElementById('tab-create').classList.add('active');
    };

    // Tao QR
    document.getElementById('genBtn').addEventListener('click', function() {
      const ttxe = document.getElementById('ttxe').value.trim();
      if (!ttxe) return alert('Vui long chon TTxe!');

      const bienso = document.getElementById('bienso').value.trim();
      const kho1 = document.getElementById('kho1').value.trim();
      const kho2 = document.getElementById('kho2').value.trim();
      const kho3 = document.getElementById('kho3').value.trim();
      const kho4 = document.getElementById('kho4').value.trim();

      const ncc = document.getElementById('ncc').value;
      const noi = document.getElementById('noi').value;
      const hang = document.getElementById('hang').value;
      const mui = document.getElementById('mui').value;
      const vitri1 = document.getElementById('vitri1').value.trim();
      const vitri2 = document.getElementById('vitri2').value.trim();
      const tongkl = document.getElementById('tongkl').value.trim();

      const dateObj = new Date(document.getElementById('ngay').value);
      const dd = pad(dateObj.getDate());
      const mm = pad(dateObj.getMonth() + 1);
      const yy = String(dateObj.getFullYear());
      const ylast = yy.charAt(yy.length - 1);

      let posPart = '';
      if (vitri1 && vitri2) posPart = vitri1 + '/' + vitri2;
      else if (vitri1) posPart = vitri1;

      const ma_lo = hang + ncc + noi + dd + mm + ylast + '-' + ttxe + '-' + mui + (posPart ? '-' + posPart : '');

      const displayDate = dd + '/' + mm + '/' + yy;

      let khoList = [kho1, kho2, kho3, kho4].filter(function(k) { return k && k.trim() !== ''; });
      const khoDisplay = khoList.join(' - ');

      document.getElementById('qrcode').innerHTML = '';
      const viewerUrl = 'viewer.html?q=' + encodeURIComponent(ma_lo);
      new QRCode(document.getElementById('qrcode'), { text: viewerUrl, width: 250, height: 250 });

      document.getElementById('qtext').innerHTML = '\n        <div>' + ma_lo + '</div>\n        <div>Ngay: ' + displayDate + '</div>\n        ' + (tongkl ? '<div>Tong KL: ' + tongkl + ' kg</div>' : '') + '\n        ' + (bienso ? '<div>Bien so: ' + bienso + '</div>' : '') + '\n        ' + (khoDisplay ? '<div>Kho: ' + khoDisplay + '</div>' : '') + '\n      ';

      saveToHistory({
        ma_lo: ma_lo,
        ngay_display: displayDate,
        ttxe: ttxe,
        bienso: bienso,
        kho1: kho1,
        kho2: kho2,
        kho3: kho3,
        kho4: kho4,
        ncc: ncc,
        noi: noi,
        hang: hang,
        mui: mui,
        vitri1: vitri1,
        vitri2: vitri2,
        tongkl: tongkl
      });
    });

    // Quet QR
    document.getElementById('scanBtn').addEventListener('click', function() {
      document.getElementById('scanModal').style.display = 'flex';
      document.getElementById('scanResult').innerHTML = '';
      startScanner();
    });

    document.getElementById('closeModal').addEventListener('click', function() {
      stopScanner();
      document.getElementById('scanModal').style.display = 'none';
    });

    function startScanner() {
      if (html5QrCode) stopScanner();
      html5QrCode = new Html5Qrcode('reader');

      html5QrCode.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 280, height: 280 } },
        function(decodedText) {
          stopScanner();
          document.getElementById('scanModal').style.display = 'none';

          if (decodedText.includes('viewer.html?q=')) {
            window.location.href = decodedText;
          } else if (decodedText.includes('?q=')) {
            window.location.href = decodedText;
          } else {
            window.location.href = 'viewer.html?q=' + encodeURIComponent(decodedText);
          }
        },
        function() {}
      ).catch(function() {
        alert('Khong the mo camera.\nVui long cho phep quyen Camera trong trinh duyet.');
        document.getElementById('scanModal').style.display = 'none';
      });
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().catch(function() {});
        html5QrCode = null;
      }
    }

    window.loadQRFromHistoryByCode = function(maLo) {
      historyRef.orderByChild('ma_lo').equalTo(maLo).once('value', function(snapshot) {
        let found = false;
        snapshot.forEach(function(child) {
          loadQRFromHistory(child.val());
          found = true;
        });
        if (!found) alert('Khong tim thay ma: ' + maLo);
      });
    };

    // Import
    document.getElementById('importBtn').addEventListener('click', function() {
      if (currentPermission !== 2) return alert('Ban khong co quyen!');
      document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        try {
          const imported = JSON.parse(event.target.result);
          if (Array.isArray(imported)) {
            if (confirm('Nhap ' + imported.length + ' ban ghi?')) {
              imported.forEach(function(item) { historyRef.push(item); });
              setTimeout(loadHistoryFromFirebase, 1000);
              alert('Nhap du lieu thanh cong!');
            }
          }
        } catch (err) { alert('Loi file: ' + err.message); }
      };
      reader.readAsText(file);
    });

    // Export
    document.getElementById('exportBtn').addEventListener('click', async function() {
      if (currentPermission !== 2) return alert('Ban khong co quyen!');
      if (history.length === 0) return alert('Lich su trong!');

      const dateStr = new Date().toISOString().slice(0,10);
      const zip = new JSZip();

      zip.file('qr-history-' + dateStr + '.json', JSON.stringify(history, null, 2));

      const excelData = history.map(function(item) {
        return {
          'Ma Lo': item.ma_lo,
          'Ngay Nhap': item.ngay_display,
          'Thoi gian': item.timestamp,
          'TTxe': item.ttxe,
          'Bien So Xe': item.bienso || '',
          'Kho 1': item.kho1 || '',
          'Kho 2': item.kho2 || '',
          'Kho 3': item.kho3 || '',
          'Kho 4': item.kho4 || '',
          'NCC': item.ncc,
          'Noi XS': item.noi,
          'Hang': item.hang,
          'Mui': item.mui,
          'Vi Tri 1': item.vitri1 || '',
          'Vi Tri 2': item.vitri2 || '',
          'Tong KL': item.tongkl || ''
        };
      });

      const ws = XLSX.utils.json_to_sheet(excelData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'LichSuQR');
      const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      zip.file('qr-history-' + dateStr + '.xlsx', excelBuffer);

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'qr-history-' + dateStr + '.zip';
      link.click();
      URL.revokeObjectURL(url);

      alert('Da tai file ZIP thanh cong!');
    });

    // Xoa toan bo
    document.getElementById('deleteAllBtn').addEventListener('click', function() {
      if (currentPermission !== 2) return alert('Ban khong co quyen!');
      if (history.length === 0) return alert('Lich su da trong!');
      if (!confirm('Ban co chac chan muon XOA TOAN BO lich su?\nHanh dong nay KHONG THE hoan tac!')) return;

      if (prompt('Nhap mat khau de xac nhan:') !== 'CTYCT2026') {
        return alert('Mat khau sai!');
      }

      historyRef.remove().then(function() {
        history = [];
        renderHistory();
        alert('Da xoa toan bo lich su thanh cong!');
      }).catch(function(err) { alert('Loi xoa: ' + err.message); });
    });

    document.getElementById('printBtn').addEventListener('click', function() { window.print(); });
    document.getElementById('clearBtn').addEventListener('click', function() { location.reload(); });

    loadHistoryFromFirebase();
  </script>
</body>
</html>
